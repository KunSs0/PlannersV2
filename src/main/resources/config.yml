database:
  use: SQL # LOCAL(local...),SQL
  sql:
    host: 127.0.0.1
    port: 3306
    user: root
    password: 123456
    database: bukkit_plugin
    table: planners_v2

settings:
  # 条件定义（供技能树/转职/EC等引用）
  condition:
    player_lv:
      exper: "player.level >= props.min"
      props:
        min: 1
      hint: "需要等级{props.min}"

    need_skill:
      exper: "player.getSkillLevel(props.skillId) >= props.lv"
      props:
        skillId: ""
        lv: 1
      hint: "需要{props.skillId} Lv{props.lv}"

    consume_sp:
      exper: "player.availablePoints() >= props.amount"
      props:
        amount: 0
      hint: "技能点不足"
      consume: "player.takePoints(props.amount)"

    is_warrior:
      exper: "player.getJob() == 'warrior'"
      props: {}
      hint: "需要战士职业"

    is_mage:
      exper: "player.getJob() == 'mage'"
      props: {}
      hint: "需要法师职业"

    need_coin:
      exper: "player.currency() >= props.amount"
      props:
        amount: 0
      hint: "金币不足{props.amount}"
      consume: "player.takeCurrency(props.amount)"

    need_item:
      exper: "player.hasItem(props.itemId, props.count)"
      props:
        itemId: ""
        count: 1
      hint: "需要{props.itemId} x{props.count}"
      consume: "player.takeItem(props.itemId, props.count)"

  # 技能点配置
  skill-points:
    # 每级获得点数，JS 表达式，变量: level
    per-level: "level <= 30 ? 3 : 2"
    # 关键等级额外奖励，JS 表达式，变量: level
    bonuses:
      10: "5"
      20: "5"
      30: "10"
      50: "15"
  attribute:
    # 逻辑属性 → 物理属性的转换映射表
    registry:
      STR:
        name: "力量"
        mappings:
          ATK: 1.0
          DEF: 0.5
      INT:
        name: "智力"
        mappings:
          MAGIC_ATK: 1.0
          MANA_REGEN: 0.3
      AGI:
        name: "敏捷"
        mappings:
          SPEED: 0.8
          CRIT: 0.3
      END:
        name: "耐力"
        mappings:
          MAX_HEALTH: 12.0
          TOUGH: 0.5
          MAX_STAMINA: 6.0
      CRIT:
        name: "暴击"
        mappings:
          CRIT: 1.0
      STRIKE:
        name: "强击"
        mappings:
          STRIKE: 1.0
      FAITH:
        name: "信仰"
        mappings:
          FAITH: 1.0
      HASTE:
        name: "急速"
        mappings:
          HASTE: 1.0
      TOUGH:
        name: "坚韧"
        mappings:
          TOUGH: 1.0
      SPIRIT:
        name: "精神"
        mappings:
          SPIRIT: 1.0
      HP:
        name: "生命基数"
        mappings:
          MAX_HEALTH: 1.0
      MP:
        name: "魔力基数"
        mappings:
          MAX_MANA: 1.0
      SP:
        name: "体力基数"
        mappings:
          MAX_STAMINA: 1.0
  # 自定义伤害类型（防止拼写错误）
  damage-causes:
    - SKILL
    - ATTRIBUTE
    - MYTHIC
  placeholder:
    # 使用模式, script, literal
    use: script
  attack:
    # 攻击保护，如果开启后无法在某些场景下攻击，这取决于插件的实现
    protect:
      enable: true
      # 应用场景
      scene:
        - world xxx
        - dungeonplus *
        - team *
        - worldguard xxx
  magic-point:
    resume:
      # 法力值的恢复的运算表达式
      expression: "1 + random(1, 2)"
      # 法力值的恢复的更新任务的轮询周期,单位tick
      update-tick: 20
    upper-limit:
      # 法力值的运算表达式
      # 可用变量:
      #   profile.level - 玩家等级
      #   profile.magicPoint - 当前魔力值
      expression: "profile.level * 2 + 100"
      # 最大法力值的更新任务的轮询周期,单位tick
      update-tick: 20
  level:
    # 同步原版等级
    synchronize: true
    # 原版经验求兼容
    original-hook: true
    # 等级隔离
    # all = 全职业统一
    # router = 职业路线独立
    # job = 职业独立
    isolation: all
    # 当 isolation 为 all 时,该选项生效
    algorithm: def0
  cooler:
    use: memory
  minecraft:
    interaction-action:
      enable: false
      empty-skill:
        material: STONE
        name: '空技能 | 待学习'
  keybinding:
    # 按键映射（注册表）
    keymapping:
      key0: { name: R, matching-type: strict, request-tick: 30, mapping: R }
      key1: { name: T, matching-type: strict, request-tick: 30, mapping: T }
      key2: { name: F, matching-type: strict, request-tick: 30, mapping: F }
      key3: { name: G, matching-type: strict, request-tick: 30, mapping: G }
      key4: { name: Q, matching-type: strict, request-tick: 30, mapping: Q }
      key5: { name: E, matching-type: strict, request-tick: 30, mapping: E }
      key6: { name: X, matching-type: strict, request-tick: 30, mapping: X }
    # 技能背包
    backpack:
      default-page: "0"
      pages:
        "0":
          name: "战斗页"
          slots:
            slot0: { key: key0 }
            slot1: { key: key1 }
            slot2: { key: key2 }
            slot3: { key: key3 }
        "1":
          name: "辅助页"
          slots:
            slot0: { key: key0 }
            slot1: { key: key4 }
            slot2: { key: key5 }
            slot3: { key: key6 }
  bukkit-launch:
    unimpeded-types:
      - AIR
      - SHORT_GRASS
      - GLASS
      - WATER
      - DANDELION
