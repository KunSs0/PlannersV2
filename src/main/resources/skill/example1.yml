__option__:
  name: "x1"
  icon-formatter:
    material: DIAMOND_SWORD
  variables:
    cooldown: 100
    damage: 32 * level + 100
    rectX: [ 4, 1, 3, 4 ]
    rectZ: [ 2, 4, 3, 3 ]

action: |
  function main() {
    // 获取当前状态索引，默认为 0
    var idx = sender.hasMetadata("x1.status")
              ? sender.getMetadata("x1.status")
              : 0

    // rectX/rectZ 为 variables 定义的数组，需通过 skill 获取
    var rectX = [4, 1, 3, 4]
    var rectZ = [2, 4, 3, 3]

    var x = rectX[idx]
    var z = rectZ[idx]

    tell("idx=" + idx + ",x=" + x + ", z=" + z)

    // 检查是否到达最后一个索引
    if (idx == 3) {
      idx = -1
    }

    // 更新状态
    sender.setMetadata("x1.status", idx + 1)
  }
