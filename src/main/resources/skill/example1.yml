__option__:
  name: "x1"
  icon-formatter:
    material: DIAMOND_SWORD
  variables:
    cooldown: 100
    damage: 32 * ctx.level + 100
    rectX: [ 4, 1, 3, 4 ]
    rectZ: [ 2, 4, 3, 3 ]

action: |
  function main() {
    // 获取当前状态索引，默认为 0
    var entity = sender.instance
    var idx = hasMeta("x1.status", entity) ? getMeta("x1.status", entity) : 0

    // 获取当前坐标
    var x = rectX[idx]
    var z = rectZ[idx]

    tell("idx=" + idx + ",x=" + x + ", z=" + z)

    // 检查是否到达最后一个索引
    if (idx == 3) {
      idx = -1
    }

    // 更新状态
    setMeta("x1.status", idx + 1, entity)
  }
  main()
