__option__:
  name: "裂地"
  display:
    icon:
      material: STONE_PICKAXE
      name: "&8裂地"
      lore:
        - "&7等级 &fLv{{level}}"
        - "&7伤害 &8{{40 * level + 100}}"
        - "&7击退 &8{{2 * level}}&7格"
  variables:
    cooldown: 150
    damage: 40 * level + 100
    knockback: 2 * level
  max-level: 14
action: |
  function main() {
    tell("&8裂地 Lv" + level)
    setCooldown(skill, getVar("cooldown"))
  }
