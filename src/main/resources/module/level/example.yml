def0:
  min: 1
  max: 100
  experience: |
    var exp;
    switch (true) {
      case level <= 10:
        exp = level * 200;
        break;
      case level <= 20:
        exp = level * 600;
        break;
      case level <= 30:
        exp = level * 900;
        break;
      case level <= 40:
        exp = level * 1200;
        break;
      case level <= 50:
        exp = level * 1600;
        break;
      default:
        exp = level * 3000;
    }
    exp
