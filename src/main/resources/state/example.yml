state0:
  priority: 0
  max-layer: 3
  name: "眩晕"
  action: |
    function main() {
      // 状态加载时执行一次，可自行注册 listener
    }
    function onStateAttach() {
      tell("眩晕层数增加")
    }
    function onStateDetach() {
      tell("眩晕层数减少")
    }
    function onStateMount() {
      tell("首次获得眩晕")
    }
    function onStateClose() {
      tell("完全解除眩晕")
    }
    function onStateEnd() {
      tell("眩晕自然结束")
    }
