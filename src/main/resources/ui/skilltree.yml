__option__:
  rows: 6
  title: "技能树"

  skill-icon-offset: 0
  level-start-offset: 2
  level-count: 6
  rows-per-page: 4

  # === 已学习（DynamicSkillIcon + append） ===
  icon-learned:
    name:
      append: " &eLv{lv} &a*"
    lore:
      append:
        - "&7已掌握"
        - "&7技能: &f{skillId}"

  # === 可学习 ===
  icon-learn:
    material: KNOWLEDGE_BOOK
    name: "&eLv{lv} &6&l>> 学习"
    lore:
      - "&e&l点击学习"
      - "&7技能: &f{skillId}"

  # === 可升级 ===
  icon-upgrade:
    material: KNOWLEDGE_BOOK
    name: "&eLv{lv} &6&l>> 升级"
    lore:
      - "&e&l点击升级"
      - "&7技能: &f{skillId}"

  # === 未解锁 ===
  icon-locked:
    material: GRAY_STAINED_GLASS_PANE
    name: "&eLv{lv} &7未解锁"
    lore:
      - "&7需先学习前置等级"
      - "&7技能: &f{skillId}"

  # === 超出上限 ===
  icon-beyond:
    material: GRAY_STAINED_GLASS_PANE
    name: "&8- Lv{lv}"
    lore:
      - "&7超出最高等级"

  # === 上/下翻（技能） ===
  icon-scroll-up:
    slot: 0
    material: SPECTRAL_ARROW
    name: "&e▲ 上翻"
  icon-scroll-up-top:
    slot: 0
    material: GRAY_DYE
    name: "&7▲ 已置顶"
  icon-scroll-down:
    slot: 45
    material: SPECTRAL_ARROW
    name: "&e下翻 ▼"
  icon-scroll-down-bottom:
    slot: 45
    material: GRAY_DYE
    name: "&7已到底 ▼"

  # === 左/右翻（等级） ===
  icon-scroll-left:
    slot: 47
    material: SPECTRAL_ARROW
    name: "&e◀ 左翻"
  icon-scroll-left-end:
    slot: 47
    material: GRAY_DYE
    name: "&7◀ 到头"
  icon-scroll-right:
    slot: 53
    material: SPECTRAL_ARROW
    name: "&e右翻 ▶"
  icon-scroll-right-end:
    slot: 53
    material: GRAY_DYE
    name: "&7到头 ▶"

  # === 等级标签 ===
  icon-level-label:
    slots: [2, 3, 4, 5, 6, 7]
    material: LIME_STAINED_GLASS_PANE
    name: "&aLv{lv}"

  # === SP 展示 ===
  icon-sp-display:
    slot: 46
    material: NETHER_STAR
    name: "&e✦ 技能点"
    lore:
      - "&f可用: &6{spCurrent}"
      - "&f已消耗: &7{spUsed}"
      - ""
      - "&7通过升级获得"

# ===== 装饰玻璃 =====
icon-#:
  slots: [1, 8, 10, 17, 19, 26, 28, 35, 37, 44, 48, 49, 50, 51, 52]
  material: GRAY_STAINED_GLASS_PANE
  name: " "
