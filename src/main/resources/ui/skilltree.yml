__option__:
  rows: 6
  title: "技能树"

  # === 已学习（DynamicSkillIcon + append） ===
  icon-learned:
    name:
      append: " &eLv{lv} &a*"
    lore:
      append:
        - "&7已掌握"
        - "&7技能: &f{skillId}"

  # === 可学习 ===
  icon-learn:
    material: KNOWLEDGE_BOOK
    name: "&eLv{lv} &6&l>> 学习"
    lore:
      - "&e&l点击学习"
      - "&7技能: &f{skillId}"

  # === 可升级 ===
  icon-upgrade:
    material: KNOWLEDGE_BOOK
    name: "&eLv{lv} &6&l>> 升级"
    lore:
      - "&e&l点击升级"
      - "&7技能: &f{skillId}"

  # === 未解锁 ===
  icon-locked:
    material: GRAY_STAINED_GLASS_PANE
    name: "&eLv{lv} &7未解锁"
    lore:
      - "&7需先学习前置等级"
      - "&7技能: &f{skillId}"

  # === 超出上限 ===
  icon-beyond:
    material: GRAY_STAINED_GLASS_PANE
    name: "&8- Lv{lv}"
    lore:
      - "&7超出最高等级"

  # === 上/下翻（技能） ===
  icon-scroll-up:
    material: SPECTRAL_ARROW
    name: "&e▲ 上翻"
  icon-scroll-up-top:
    material: GRAY_DYE
    name: "&7▲ 已置顶"
  icon-scroll-down:
    material: SPECTRAL_ARROW
    name: "&e下翻 ▼"
  icon-scroll-down-bottom:
    material: GRAY_DYE
    name: "&7已到底 ▼"

  # === 左/右翻（等级） ===
  icon-scroll-left:
    material: SPECTRAL_ARROW
    name: "&e◀ 左翻"
  icon-scroll-left-end:
    material: GRAY_DYE
    name: "&7◀ 到头"
  icon-scroll-right:
    material: SPECTRAL_ARROW
    name: "&e右翻 ▶"
  icon-scroll-right-end:
    material: GRAY_DYE
    name: "&7到头 ▶"

  # === 等级标签 ===
  icon-level-label:
    material: LIME_STAINED_GLASS_PANE
    name: "&aLv{lv}"

  # === SP 展示 ===
  icon-sp-display:
    material: NETHER_STAR
    name: "&e✦ 技能点"
    lore:
      - "&f可用: &6{spCurrent}"
      - "&f已消耗: &7{spUsed}"
      - ""
      - "&7通过升级获得"

# ===== 装饰玻璃 =====
# Row0 Col1 | Rows1-4 Col1,8 | Row5 Col0,3-6
icon-#:
  slots: [1, 10, 17, 19, 26, 28, 35, 37, 44, 45, 48, 49, 50, 51]
  material: GRAY_STAINED_GLASS_PANE
  name: " "

# ===== 等级标签 (Row 0, Col2-7) =====
icon-lv1:
  slot: 2
  material: LIME_STAINED_GLASS_PANE
  name: "&aLv1"
icon-lv2:
  slot: 3
  material: LIME_STAINED_GLASS_PANE
  name: "&aLv2"
icon-lv3:
  slot: 4
  material: LIME_STAINED_GLASS_PANE
  name: "&aLv3"
icon-lv4:
  slot: 5
  material: LIME_STAINED_GLASS_PANE
  name: "&aLv4"
icon-lv5:
  slot: 6
  material: LIME_STAINED_GLASS_PANE
  name: "&aLv5"
icon-lv6:
  slot: 7
  material: LIME_STAINED_GLASS_PANE
  name: "&aLv6"
