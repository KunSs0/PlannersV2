  title: "技能背包 - {0}"
  slots: [ 10, 11, 12, 13 ]

  # 独立 icon
  icon-empty-slot:
    material: GRAY_STAINED_GLASS_PANE
    name: "&7空槽位 [{keyName}]"
    lore:
      - "&f左键装备技能"

  icon-prev-page:
    material: ARROW
    name: "&a上一页"

  icon-next-page:
    material: ARROW
    name: "&a下一页"

